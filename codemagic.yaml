workflows:
  ios-release:
    name: TDG iOS Release
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: '*'
          include: true
    scripts:
      - name: Setup
        script: |
          cd ttt
          flutter pub get
      - name: Build iOS
        script: |
          cd ttt
          flutter build ios --release --no-codesign
    artifacts:
      - ttt/build/ios/iphoneos/Runner.app
